<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Подарочный сертификат — Artic Store</title>
    <style>
      .overlay,
      .search,
      .mega-menu,
      .mobile-menu {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    {{> layout/sprite }}

    {{> layout/header }}

    <main class="main">
      <div class="surface gift" data-gift>
        <nav class="breadcrumbs" aria-label="Хлебные крошки" data-breadcrumbs></nav>
        <div class="gift__layout">
          <div class="gift__info" data-info></div>
          <div class="gift__media" data-media></div>
        </div>
      </div>
    </main>

    {{> layout/footer }}

    {{> layout/mobile-menu }}

    <div class="overlay" data-overlay></div>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
