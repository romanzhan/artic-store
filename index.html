<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Artic Store</title>
    <style>
      .overlay,
      .search,
      .mega-menu,
      .mobile-menu {
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    {{> layout/sprite }}

    {{> layout/header }}
    {{> layout/category-bar }}

    <main class="main">
      {{> sections/hero-slider }}
      <div class="surface">
        {{> sections/promo }}
        {{> sections/products-slider title="Акции" source="sale" }}
      </div>
    </main>

    {{> layout/footer }}

    {{> layout/mobile-menu }}

    <div class="overlay" data-overlay></div>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
